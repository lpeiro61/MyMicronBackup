########################################
# Homing and Gantry Adjustment Routines
########################################
[quad_gantry_level]
speed: 100
horizontal_move_z: 2
retries: 5
retry_tolerance: 0.075
max_adjust: 10

# Gantry Corners for Micron+ Build
# Explanation:
#        z1 ----------------------- z2
#           |                     |
#           |     -----------     |
#           |     |         |     |
#           |     |   bed   |     |
#           |     |         |     |
#           |   0,0 ---------     |
#           |                     |
#         z ----------------------- z3
#               
# gantry corners:
#    z pos
#    z2 pos
gantry_corners:
   -60.2,-10.4
   244.1,234.5

# Probe points with Cartographer3D
points:
 18,6
 18,135
 155,135
 155,6


#########################################
## Input Shaping
#########################################
# -- with Cartographer3D --
[adxl345]
cs_pin: cartographer:PA0  # v4
spi_bus: spi1

# -- with EBB36 --
# [adxl345]
# cs_pin: EBB36: PB12
# spi_software_sclk_pin: EBB36: PB10
# spi_software_mosi_pin: EBB36: PB11
# spi_software_miso_pin: EBB36: PB2
# axes_map: x,y,z

[resonance_tester]
accel_chip: adxl345
probe_points:
    # Somewhere slightly above the middle of your print bed
    87,90,20

[input_shaper]
shaper_type_x = mzv
shaper_freq_x = 61.2
shaper_type_y = mzv
shaper_freq_y = 70.5


#########################################
## FANS & LEDS & BUZZER
#########################################

########## Toolhead ##########
# Part fans
[fan]
pin: EBB:PD3

## Hotend fan
[heater_fan hotend_fan]
pin: EBB:PA5
heater: extruder
heater_temp: 50.0
fan_speed: 0.9
max_power: 1

## Hotend leds
[neopixel hotend_led]
pin:  EBB:PC7
chain_count: 2
color_order: GBR
initial_RED: 0.75
initial_GREEN: 0.75
initial_BLUE: 0.75

########## Chamber ##########
## Chamber leds
[output_pin daylight]
pin: PA5
pwm: true
value: 0.25
cycle_time: 0.01

########## Electronic fans ##########
##--------- Sides fans -----------##
[multi_pin electronic_fans_pins]
pins: PF7

[fan_generic electronic_fans]
pin=multi_pin:electronic_fans_pins
max_power: 1

########### Bed fans ###########
# bed fans
[fan_generic bed_fans]
pin: PF6
max_power: 1
shutdown_speed: 0.0

# filter fan
[fan_generic filter_fan]
pin: PF9
max_power: 1
shutdown_speed: 0.0

########### Initial fans speed ###########
[delayed_gcode start_fan_at_idle_speed]
initial_duration: 1.0
gcode:
  # SET_FAN_SPEED FAN=bed_fans SPEED=0.6
  # SET_FAN_SPEED FAN=filter_fan SPEED=0.6
  SET_FAN_SPEED FAN=electronic_fans SPEED=0.5
  
############## Buzzer ##############
# [output_pin buzzer_pin]
# pin: PE5
# pwm: false
# value: 0


########################################
# Aditional sensors
########################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE9, EXP1_2=PE10,
    EXP1_3=PE11, EXP1_4=PE12,
    EXP1_5=PE13, EXP1_6=PE14,    # Slot in the socket on this side
    EXP1_7=PE15, EXP1_8=PB10,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PB14, EXP2_2=PB13,
    EXP2_3=PF7, EXP2_4=PB12,
    EXP2_5=PE7, EXP2_6=PB11,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=PC5


