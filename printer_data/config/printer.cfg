[include mainsail.cfg]
[include macros.cfg]
[include sensorless.cfg]
# [include led_effects.cfg] ##

[include moonraker_obico_macros.cfg]

[idle_timeout]
timeout: 3600
  
[virtual_sdcard]
path: /home/biqu/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[display_status]
# [pause_resume]

# Enable object exclusion
[exclude_object]

# Enable arcs support
[gcode_arcs]
resolution: 0.1

[mcu]
canbus_uuid: 401058209e84
# canbus_interface: can0

[mcu EBB]
canbus_uuid: 8e876e9a03d4

[mcu cartographer]
canbus_uuid: facd7e2d2348   # v4

[printer]
kinematics: corexy
max_velocity: 150
max_accel: 5000
max_z_velocity: 5
max_z_accel: 350
square_corner_velocity: 5.0

[temperature_sensor M8P]
sensor_type: temperature_mcu
sensor_mcu: mcu

[temperature_sensor CB2]
sensor_type: temperature_host

[temperature_sensor EBB36]
sensor_type: temperature_mcu
sensor_mcu: EBB
# sensor_type: Generic 3950
# sensor_pin: EBB:PA0
# pullup_resistor: 2200
min_temp: 5
max_temp: 85

[temperature_sensor Cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 100

[temperature_sensor Chamber]
sensor_pin: PC5
sensor_type: Generic 3950
min_temp: 0
max_temp: 70

#########################################
## Extruder
#########################################
[extruder]
step_pin: EBB:PB14
dir_pin: EBB:PA8
enable_pin: !EBB:PB6
gear_ratio: 9:1
microsteps: 16
rotation_distance: 47.2707852
#  Update value above when you perform extruder calibration.
#  If you ask for 100 mm of filament, but in reality it is 98 mm:
#  new rotation_distance = (current rotation_distance) x (current extrude_distance-> 98) / (asked extrude_distance-> 100).

full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBB:PB4
sensor_type: EPCOS 100K B57560G104F
pullup_resistor: 2200
sensor_pin: EBB:PA3
min_temp: 10
max_temp:290
max_power: 0.8
#control: pid
#pid_kp: 26.213
#pid_ki: 1.304
#pid_kd: 131.721

max_extrude_only_distance: 100.0
max_extrude_cross_section: 5   # To allow effective purging to possible. (Purge in KAMP).

[tmc2209 extruder]
uart_pin: EBB:PB3
run_current: 0.6
sense_resistor: 0.11
stealthchop_threshold: 0


#########################################
## X/Y Steppers
#########################################

# X stepper (B Motor) - Left
# Connected to MOTOR_1
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 32
rotation_distance: 32
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 0  # 173 -> dreta // # 0 -> esquerre
position_min: 0
position_max: 173
homing_speed: 35
homing_positive_dir: false # true -> dreta // # false -> esquerre 
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PC13
diag_pin: PF4
interpolate: false
run_current: 0.650
sense_resistor: 0.110
stealthchop_threshold: 0
driver_SGTHRS: 72

# Y stepper (A Motor) - Right
# Connected to MOTOR_2
[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 32
rotation_distance: 32
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 190
position_min: 0
position_max: 190
homing_speed: 35
homing_positive_dir: true
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PE3
diag_pin: PF3
interpolate: false
run_current: 0.650
sense_resistor: 0.110
stealthchop_threshold: 0
driver_SGTHRS: 80


#########################################
## Z Steppers
#########################################

# Z0 Stepper - Front Left
# Connected to Motor 4
[stepper_z]
step_pin: PB4
dir_pin: PB3
enable_pin: !PB6
endstop_pin: ^PF1
microsteps: 32
rotation_distance: 32
endstop_pin: probe: z_virtual_endstop
gear_ratio: 64:16

## Z-position of nozzle (in mm) to z-endstop trigger point relative to print surface (Z0)
## (+) value = endstop above Z0, (-) value = endstop below.
## Increasing position_endstop brings nozzle closer to de bed.
## After you run Z-ENDSTOP_CALIBRTE, position_endstop will be stored at the very end of your config.
# position_endstop: 180

position_max: 170
position_min: -5.0
homing_speed: 4
second_homing_speed: 3
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PB5
interpolate: false
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

# Z1 Stepper - Rear Left
# Connected to Motor 5
[stepper_z1]
step_pin: PG13
dir_pin: !PG12
enable_pin: !PG15
microsteps: 32
rotation_distance: 32
gear_ratio: 64:16

[tmc2209 stepper_z1]
uart_pin: PG14
interpolate: false
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

# Z2 Stepper - Rear Right
# Connected to Motor 6
[stepper_z2]
step_pin: PG9
dir_pin: PD7
enable_pin: !PG11 
microsteps: 32
rotation_distance: 32
gear_ratio: 64:16

[tmc2209 stepper_z2]
uart_pin: PG10
interpolate: false
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

# Z3 Stepper - Rear Right
# Connected to Motor 7
[stepper_z3]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD6
microsteps: 32
rotation_distance: 32
gear_ratio: 64:16

[tmc2209 stepper_z3]
uart_pin: PD5
interpolate: false
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0


#########################################
## Bed Heater
#########################################
[heater_bed]
heater_pin: PA1
sensor_pin: PB1 # THB 
sensor_type: Generic 3950
max_power: 0.95
min_temp: 0
max_temp: 120


########################################
## PROBE Cartographer
########################################
[cartographer]
mcu: cartographer            
#   Offsets are measured from the centre of your coil, to the tip of your nozzle 
#   on a level axis. It is vital that this is accurate. 
x_offset: 0                          
#    adjust for your cartographers offset from nozzle to middle of coil
y_offset: 20                         
#    adjust for your cartographers offset from nozzle to middle of coil
# backlash_comp: 0.00774
#   Backlash compensation distance for removing Z backlash before measuring
#   the sensor response.
# sensor: cartographer
#    this must be set as cartographer unless using IDM etc.
# sensor_alt: carto
#    alternate name to call commands. CARTO_TOUCH etc      
# mesh_runs: 2
#    Number of passes to make during mesh scan.


